spring:
  application:
    name: card-showcase

  datasource:
    url: jdbc:postgresql://localhost:5432/card_showcase
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:68sportfield@gmail.com}
    password: ${MAIL_PASSWORD:bksv bvwf yvun gzdk}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  upload-dir: ./uploads
  notification:
    admin-email: ${ADMIN_EMAIL:68sportfield@gmail.com}
    enabled: true

server:
  port: 8080
  tomcat:
    max-http-response-size: 1048576
