<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}"
      lang="en">
<head>
  <title>Request a Quote — Card Showcase</title>
</head>
<body>
<div layout:fragment="content">

  <!-- ════════════════════════════════════════════════════════════
       HEADER (DARK)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-dark" style="padding: 48px 0 40px;">
    <div class="cs-container" style="text-align:center;">
      <h1 class="cs-headline-lg" style="color:#ffffff; margin:0 0 12px;">Request a Quote</h1>
      <p style="color:rgba(255,255,255,0.55); font-size:15px; margin:0 auto; max-width:520px;">
        Fill in the form below and our wholesale team will get back to you with
        pricing and availability.
      </p>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════
       INQUIRY FORM (DARK)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-dark cs-section">
    <div class="cs-container">

      <div class="cs-inquiry-form-wrap">
        <form id="inquiryForm" novalidate>
          <!-- No productId — general inquiry -->

          <p class="cs-section-subtitle-dark" style="margin-bottom:28px;">
            Interested in a specific product?
            <a th:href="@{/products}" style="color:rgba(255,255,255,0.75); text-decoration:underline;">
              Browse our catalog
            </a>
            and inquire directly from the product page.
          </p>

          <div class="cs-inquiry-row">
            <!-- Name -->
            <div class="cs-inquiry-field">
              <label class="cs-inquiry-label">Name <span class="cs-inquiry-req">*</span></label>
              <input type="text" name="customerName" class="cs-inquiry-input"
                     placeholder="Your full name" required autocomplete="name">
            </div>
            <!-- Email -->
            <div class="cs-inquiry-field">
              <label class="cs-inquiry-label">Email <span class="cs-inquiry-req">*</span></label>
              <input type="email" name="customerEmail" class="cs-inquiry-input"
                     placeholder="your@email.com" required autocomplete="email">
            </div>
          </div>

          <div class="cs-inquiry-row">
            <!-- Phone -->
            <div class="cs-inquiry-field">
              <label class="cs-inquiry-label">Phone <span class="cs-inquiry-opt">Optional</span></label>
              <input type="tel" name="customerPhone" class="cs-inquiry-input"
                     placeholder="+1 (555) 000-0000" autocomplete="tel">
            </div>
            <!-- Company -->
            <div class="cs-inquiry-field">
              <label class="cs-inquiry-label">Company <span class="cs-inquiry-opt">Optional</span></label>
              <input type="text" name="customerCompany" class="cs-inquiry-input"
                     placeholder="Your company name" autocomplete="organization">
            </div>
          </div>

          <!-- Quantity -->
          <div class="cs-inquiry-field">
            <label class="cs-inquiry-label">Quantity <span class="cs-inquiry-opt">Optional</span></label>
            <input type="number" name="quantity" class="cs-inquiry-input"
                   placeholder="How many cases/boxes?" min="1" style="max-width:280px;">
          </div>

          <!-- Message -->
          <div class="cs-inquiry-field">
            <label class="cs-inquiry-label">Message <span class="cs-inquiry-opt">Optional</span></label>
            <textarea name="message" class="cs-inquiry-input cs-inquiry-textarea"
                      rows="4"
                      placeholder="Tell us about your requirements…"></textarea>
          </div>

          <button type="submit" class="cs-btn-pill cs-btn-pill-blue cs-inquiry-submit">
            Submit Inquiry
          </button>
        </form>
      </div>

    </div>
  </section>

</div>

<th:block layout:fragment="scripts">
  <script th:src="@{/js/inquiry-form.js}" defer></script>
</th:block>

</body>
</html>
