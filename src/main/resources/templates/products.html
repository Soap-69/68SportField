<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}"
      lang="en">
<head>
  <title th:text="${filterTitle} + ' — 68 Sport Field'">Products — 68 Sport Field</title>
</head>
<body>
<div layout:fragment="content">

  <!-- Breadcrumb -->
  <div th:replace="~{fragments/breadcrumb :: breadcrumbBar(${breadcrumbs})}"></div>

  <!-- ════════════════════════════════════════════════════════════
       HEADER (DARK)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-dark" style="padding: 40px 0 32px;">
    <div class="cs-container">
      <h1 class="cs-headline-lg" style="color:#ffffff; margin:0 0 8px;"
          th:text="${filterTitle}">Products</h1>
      <p style="color:rgba(255,255,255,0.55); font-size:15px; margin:0;">
        <span th:text="${products.totalElements}">0</span>
        product<span th:if="${products.totalElements != 1}">s</span>
      </p>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════
       PRODUCT GRID (LIGHT)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-light cs-section">
    <div class="cs-container">

      <!-- Sort + filter bar -->
      <div class="cs-search-header" style="margin-bottom:32px;">
        <!-- Filter pills -->
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <a th:href="@{/products}"
             class="cs-btn-pill cs-btn-pill-dark"
             th:classappend="${currentFilter == null or currentFilter == ''} ? '' : ''"
             style="font-size:13px; padding:8px 18px;"
             th:style="${(currentFilter == null or currentFilter == '') ? 'background:#0071e3;' : ''}">
            All
          </a>
          <a th:href="@{/products(filter='trending',sort=${currentSort})}"
             class="cs-btn-pill cs-btn-pill-dark"
             style="font-size:13px; padding:8px 18px;"
             th:style="${currentFilter == 'trending'} ? 'background:#0071e3;' : ''">
            Trending
          </a>
          <a th:href="@{/products(filter='new',sort=${currentSort})}"
             class="cs-btn-pill cs-btn-pill-dark"
             style="font-size:13px; padding:8px 18px;"
             th:style="${currentFilter == 'new'} ? 'background:#0071e3;' : ''">
            New Releases
          </a>
          <a th:href="@{/products(filter='best-sellers',sort=${currentSort})}"
             class="cs-btn-pill cs-btn-pill-dark"
             style="font-size:13px; padding:8px 18px;"
             th:style="${currentFilter == 'best-sellers'} ? 'background:#0071e3;' : ''">
            Best Sellers
          </a>
          <a th:href="@{/products(filter='sale',sort=${currentSort})}"
             class="cs-btn-pill cs-btn-pill-dark"
             style="font-size:13px; padding:8px 18px;"
             th:style="${currentFilter == 'sale'} ? 'background:#0071e3;' : ''">
            On Sale
          </a>
          <a th:href="@{/products(filter='pre-order',sort=${currentSort})}"
             class="cs-btn-pill cs-btn-pill-dark"
             style="font-size:13px; padding:8px 18px;"
             th:style="${currentFilter == 'pre-order'} ? 'background:#0071e3;' : ''">
            Pre-Order
          </a>
        </div>

        <!-- Sort dropdown -->
        <form method="get" action="/products" class="cs-search-sort-form">
          <input type="hidden" name="filter" th:value="${currentFilter}">
          <select name="sort" class="cs-search-sort-select" onchange="this.form.submit()">
            <option value="default"   th:selected="${currentSort == 'default'}">Default</option>
            <option value="price-asc" th:selected="${currentSort == 'price-asc'}">Price: Low to High</option>
            <option value="price-desc" th:selected="${currentSort == 'price-desc'}">Price: High to Low</option>
            <option value="newest"    th:selected="${currentSort == 'newest'}">Newest</option>
          </select>
        </form>
      </div>

      <!-- Empty state -->
      <div class="cs-search-empty" th:if="${products.isEmpty()}">
        <p>No products found<span th:if="${currentFilter != null and !#strings.isEmpty(currentFilter)}">
          in this category</span>.</p>
        <a th:href="@{/products}" class="cs-btn-pill cs-btn-pill-blue"
           style="margin-top:24px; display:inline-block;">View All Products</a>
      </div>

      <!-- Product grid -->
      <div class="cs-product-grid" th:unless="${products.isEmpty()}">
        <div th:each="p : ${products.content}">
          <div th:replace="~{fragments/product-card :: productCard(${p}, 'light', ${primaryImages[p.id]})}"></div>
        </div>
      </div>

      <!-- Pagination -->
      <nav class="cs-pagination" th:if="${products.totalPages > 1}" aria-label="Pagination">

        <a th:if="${!products.first}"
           th:href="@{/products(filter=${currentFilter},sort=${currentSort},page=${products.number - 1})}"
           class="cs-page-link cs-page-prev">&#8592; Previous</a>
        <span th:if="${products.first}" class="cs-page-link cs-page-disabled">&#8592; Previous</span>

        <div class="cs-page-numbers">
          <th:block th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:if="${i >= products.number - 2 and i <= products.number + 2}">
            <a th:if="${i != products.number}"
               th:href="@{/products(filter=${currentFilter},sort=${currentSort},page=${i})}"
               th:text="${i + 1}"
               class="cs-page-link cs-page-num">1</a>
            <span th:if="${i == products.number}"
                  th:text="${i + 1}"
                  class="cs-page-link cs-page-num cs-page-current"
                  aria-current="page">1</span>
          </th:block>
        </div>

        <a th:if="${!products.last}"
           th:href="@{/products(filter=${currentFilter},sort=${currentSort},page=${products.number + 1})}"
           class="cs-page-link cs-page-next">Next &#8594;</a>
        <span th:if="${products.last}" class="cs-page-link cs-page-disabled">Next &#8594;</span>

      </nav>

    </div>
  </section>

</div>
</body>
</html>
