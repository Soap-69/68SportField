<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}"
      lang="en">
<head>
  <title th:text="${category.name} + ' — Card Showcase'">Category — Card Showcase</title>
</head>
<body>
<div layout:fragment="content">

  <!-- ── Breadcrumb ── -->
  <div th:replace="~{fragments/breadcrumb :: breadcrumbBar(${breadcrumbs})}"></div>

  <!-- ════════════════════════════════════════════════════════════
       L1 / L2 CATEGORY — Subcategory grid (LIGHT section)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-light cs-section" th:if="${children != null}">
    <div class="cs-container">

      <!-- Section header -->
      <div class="cs-section-header" style="text-align:left; margin-bottom:32px;">
        <h1 class="cs-headline-lg cs-section-title-light" th:text="${category.name}">Category</h1>
        <p class="cs-section-subtitle-light"
           th:if="${category.level == 1}">Browse sub-categories</p>
        <p class="cs-section-subtitle-light"
           th:if="${category.level == 2}">Select a year to browse products</p>
      </div>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(children)}"
           class="text-center py-5" style="color:var(--color-text-tertiary);">
        <p style="font-size:17px;">No sub-categories found.</p>
      </div>

      <!-- Subcategory grid -->
      <div class="cs-subcat-grid"
           th:unless="${#lists.isEmpty(children)}"
           th:classappend="${category.level == 2} ? ' cs-subcat-grid-years'">

        <a th:each="child : ${children}"
           th:href="@{/category/{slug}(slug=${child.slug})}"
           class="cs-subcat-card"
           th:classappend="${category.level == 2} ? ' cs-subcat-card-year'">

          <!-- Category image (L2 cards when parent is L1) -->
          <div class="cs-subcat-card-img-wrap"
               th:if="${category.level == 1 and child.imageUrl != null}">
            <img th:src="${child.imageUrl}"
                 th:alt="${child.name}"
                 class="cs-subcat-card-img"
                 loading="lazy">
          </div>

          <div class="cs-subcat-card-body">
            <span class="cs-subcat-card-name" th:text="${child.name}">Name</span>
            <span class="cs-subcat-card-arrow" aria-hidden="true">›</span>
          </div>
        </a>

      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════
       L3 CATEGORY — Product listing (LIGHT section)
       ════════════════════════════════════════════════════════════ -->
  <section class="cs-section-light cs-section" th:if="${products != null}">
    <div class="cs-container">

      <!-- Section header -->
      <div class="cs-section-header" style="text-align:left; margin-bottom:32px;">
        <h1 class="cs-headline-lg cs-section-title-light" th:text="${category.name}">Category</h1>
        <p class="cs-section-subtitle-light">
          <span th:text="${products.totalElements}">0</span> product(s)
        </p>
      </div>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(products.content)}"
           class="text-center py-5" style="color:var(--color-text-tertiary);">
        <p style="font-size:17px;">No products in this category yet.</p>
        <a th:href="@{/}" class="cs-btn-pill cs-btn-pill-dark" style="margin-top:16px;">Back to Home</a>
      </div>

      <!-- Product grid -->
      <div class="cs-product-grid cs-product-grid-browse"
           th:unless="${#lists.isEmpty(products.content)}">
        <div th:each="p : ${products.content}">
          <div th:replace="~{fragments/product-card :: productCard(${p}, 'light', ${primaryImages[p.id]})}"></div>
        </div>
      </div>

      <!-- ── Pagination ── -->
      <nav class="cs-pagination" th:if="${products.totalPages > 1}" aria-label="Pagination">

        <a th:if="${!products.first}"
           th:href="@{/category/{slug}(slug=${category.slug}, page=${products.number - 1})}"
           class="cs-page-link cs-page-prev">&#8592; Previous</a>
        <span th:if="${products.first}" class="cs-page-link cs-page-disabled">&#8592; Previous</span>

        <!-- Page numbers (tablet/desktop) -->
        <div class="cs-page-numbers">
          <th:block th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:if="${i >= products.number - 2 and i <= products.number + 2}">
            <a th:if="${i != products.number}"
               th:href="@{/category/{slug}(slug=${category.slug}, page=${i})}"
               th:text="${i + 1}"
               class="cs-page-link cs-page-num">1</a>
            <span th:if="${i == products.number}"
                  th:text="${i + 1}"
                  class="cs-page-link cs-page-num cs-page-current"
                  aria-current="page">1</span>
          </th:block>
        </div>

        <a th:if="${!products.last}"
           th:href="@{/category/{slug}(slug=${category.slug}, page=${products.number + 1})}"
           class="cs-page-link cs-page-next">Next &#8594;</a>
        <span th:if="${products.last}" class="cs-page-link cs-page-disabled">Next &#8594;</span>

      </nav>

    </div>
  </section>

</div>
</body>
</html>
