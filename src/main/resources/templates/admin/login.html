<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login — Card Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3550 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .35);
        }
        .login-brand .bi {
            font-size: 2.5rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div style="width: 100%; max-width: 420px;" class="px-3">

        <!-- Brand / header -->
        <div class="text-center mb-4 login-brand">
            <span class="bg-primary rounded-3 p-2 d-inline-block mb-2">
                <i class="bi bi-layers-fill text-white"></i>
            </span>
            <h1 class="fs-4 fw-bold text-white mb-0">Card Showcase</h1>
            <p class="text-white-50 small">Admin Panel</p>
        </div>

        <!-- Login card -->
        <div class="card login-card">
            <div class="card-body p-4">

                <h2 class="card-title fs-5 fw-semibold mb-4 text-center">Sign in to your account</h2>

                <!-- Error / logout / username-changed messages -->
                <div th:if="${param.usernameChanged}"
                     class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>Username updated. Please log in with your new username.</span>
                </div>
                <div th:if="${param.error}"
                     class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Invalid username or password. Please try again.</span>
                </div>
                <div th:if="${param.logout}"
                     class="alert alert-info d-flex align-items-center gap-2 py-2" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>You have been signed out successfully.</span>
                </div>

                <!-- Login form — th:action auto-injects CSRF token -->
                <form th:action="@{/admin/login}" method="post" novalidate>

                    <div class="mb-3">
                        <label for="username" class="form-label fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   class="form-control border-start-0"
                                   placeholder="admin"
                                   autofocus
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control border-start-0"
                                   placeholder="••••••••"
                                   required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <p class="text-center text-white-50 small mt-3">&copy; 2025 Card Showcase. All rights reserved.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
