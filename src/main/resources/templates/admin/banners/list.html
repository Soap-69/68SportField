<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}"
      lang="en">
<head><title>Banner Management</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Page header ── -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h2 class="h4 fw-bold mb-0">Banner Management</h2>
            <p class="text-muted small mb-0">
                <span th:text="${#lists.size(banners)}">0</span> banner(s) total
            </p>
        </div>
        <a th:href="@{/admin/banners/create}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle me-1"></i>Add Banner
        </a>
    </div>

    <!-- ── Banner table ── -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="font-size:.875rem;">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3" style="width:220px;">Image</th>
                            <th>Title</th>
                            <th>Link URL</th>
                            <th class="text-center" style="width:80px;">Order</th>
                            <th class="text-center" style="width:90px;">Status</th>
                            <th class="text-end pe-3" style="width:110px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>

                        <tr th:if="${#lists.isEmpty(banners)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-images fs-2 d-block mb-2"></i>
                                No banners yet.
                                <a th:href="@{/admin/banners/create}">Add the first one.</a>
                            </td>
                        </tr>

                        <tr th:each="b : ${banners}">

                            <!-- Image thumbnail -->
                            <td class="ps-3">
                                <img th:src="${b.imageUrl}"
                                     alt="banner"
                                     class="rounded"
                                     style="width:200px;height:75px;object-fit:cover;">
                            </td>

                            <!-- Title -->
                            <td>
                                <span th:text="${b.title ?: '—'}" class="fw-medium"></span>
                            </td>

                            <!-- Link URL -->
                            <td>
                                <a th:if="${b.linkUrl != null and !#strings.isEmpty(b.linkUrl)}"
                                   th:href="${b.linkUrl}"
                                   th:text="${b.linkUrl}"
                                   target="_blank"
                                   class="text-truncate d-inline-block text-muted small"
                                   style="max-width:220px;"></a>
                                <span th:unless="${b.linkUrl != null and !#strings.isEmpty(b.linkUrl)}"
                                      class="text-muted">—</span>
                            </td>

                            <!-- Sort order -->
                            <td class="text-center text-muted" th:text="${b.sortOrder}">0</td>

                            <!-- Status toggle -->
                            <td class="text-center">
                                <form th:action="@{/admin/banners/{id}/toggle-active(id=${b.id})}" method="post" class="m-0">
                                    <button type="submit"
                                            th:class="${b.isActive} ? 'badge bg-success border-0 py-1 px-2' : 'badge bg-secondary border-0 py-1 px-2'"
                                            style="font-size:.75rem; cursor:pointer;">
                                        <span th:text="${b.isActive} ? 'Active' : 'Inactive'"></span>
                                    </button>
                                </form>
                            </td>

                            <!-- Actions -->
                            <td class="text-end pe-3">
                                <div class="d-flex justify-content-end gap-1">
                                    <a th:href="@{/admin/banners/{id}/edit(id=${b.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <button type="button"
                                            class="btn btn-sm btn-outline-danger"
                                            title="Delete"
                                            data-bs-toggle="modal" data-bs-target="#deleteModal"
                                            th:attr="data-banner-id=${b.id}, data-banner-title=${b.title ?: 'this banner'}">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </div>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── Delete Modal ── -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-semibold">
                        <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Delete Banner
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-1">Are you sure you want to delete:</p>
                    <p class="fw-semibold text-danger mb-1" id="deleteBannerTitle">—</p>
                    <p class="text-muted small mb-0">The banner image file will also be removed. This action cannot be undone.</p>
                </div>
                <div class="modal-footer border-top-0 pt-0 gap-2">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <form id="deleteForm" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash3 me-1"></i>Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    const deleteModal = document.getElementById('deleteModal');
    deleteModal.addEventListener('show.bs.modal', function (event) {
        const btn  = event.relatedTarget;
        const base = /*[[@{/admin/banners}]]*/ '/admin/banners';
        document.getElementById('deleteBannerTitle').textContent = btn.getAttribute('data-banner-title');
        document.getElementById('deleteForm').action = base + '/' + btn.getAttribute('data-banner-id') + '/delete';
    });
</script>
</th:block>

</body>
</html>
