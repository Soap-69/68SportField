<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE — 68 Sport Field Admin">68 Sport Field Admin</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Admin-specific styles (no dependency on design-system.css or public.css) -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="cs-admin-wrap" id="csAdminWrap">

    <!-- ═══════════ SIDEBAR ═══════════ -->
    <aside class="cs-sidebar" id="csAdminSidebar" aria-label="Admin navigation">
        <div class="cs-sidebar-inner">

            <!-- Brand -->
            <a th:href="@{/admin}" class="cs-brand text-white text-decoration-none d-flex align-items-center gap-2 mb-4">
                <span class="bg-primary rounded p-1 lh-1">
                    <i class="bi bi-layers-fill text-white fs-6"></i>
                </span>
                <span>68 Sport Field</span>
            </a>

            <div class="cs-section-label">Main Menu</div>

            <ul class="nav nav-pills flex-column gap-1 mb-auto mt-1">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}"
                       th:classappend="${currentUri == '/admin' or currentUri == '/admin/'} ? 'active' : ''">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/categories}"
                       th:classappend="${currentUri.startsWith('/admin/categories')} ? 'active' : ''">
                        <i class="bi bi-folder2-open me-2"></i>Categories
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/products}"
                       th:classappend="${currentUri.startsWith('/admin/products')} ? 'active' : ''">
                        <i class="bi bi-box-seam me-2"></i>Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/inquiries}"
                       th:classappend="${currentUri.startsWith('/admin/inquiries')} ? 'active' : ''">
                        <i class="bi bi-envelope me-2"></i>Inquiries
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/banners}"
                       th:classappend="${currentUri.startsWith('/admin/banners')} ? 'active' : ''">
                        <i class="bi bi-images me-2"></i>Banners
                    </a>
                </li>

            </ul>

            <!-- Bottom: Settings + user info -->
            <hr class="border-secondary mt-3 mb-2">

            <a class="nav-link text-white-50 d-flex align-items-center gap-2 mb-3"
               style="font-size:.85rem;"
               th:href="@{/admin/settings}"
               th:classappend="${currentUri.startsWith('/admin/settings')} ? 'text-white fw-semibold' : ''">
                <i class="bi bi-gear"></i>Settings
            </a>

            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center"
                     style="width:32px;height:32px;flex-shrink:0;">
                    <i class="bi bi-person-fill text-white" style="font-size:.85rem;"></i>
                </div>
                <div style="min-width:0;">
                    <div class="text-white fw-semibold text-truncate" style="font-size:.8rem;"
                         sec:authentication="name">Admin</div>
                    <div style="font-size:.7rem;color:rgba(255,255,255,.4);">Administrator</div>
                </div>
            </div>

        </div>
    </aside>
    <!-- Mobile backdrop -->
    <div class="cs-sidebar-backdrop" id="csSidebarBackdrop" aria-hidden="true"></div>
    <!-- ═══════════ END SIDEBAR ═══════════ -->

    <!-- ═══════════ MAIN AREA ═══════════ -->
    <div class="cs-content" id="csAdminContent">

        <!-- Top navbar -->
        <nav class="cs-topbar">
            <div class="d-flex align-items-center gap-3">
                <!-- Hamburger — always visible, toggles sidebar on all screen sizes -->
                <button class="cs-sidebar-toggle" id="csSidebarToggle"
                        type="button" aria-label="Toggle navigation">
                    <i class="bi bi-list fs-5"></i>
                </button>
                <span class="fw-semibold text-dark" th:text="${pageTitle ?: 'Admin'}">Admin</span>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <!-- User dropdown -->
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center gap-1"
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name" class="d-none d-sm-inline">Admin</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/settings}">
                                <i class="bi bi-gear me-2"></i>Settings
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/admin/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page content -->
        <main class="cs-main p-4">
            <!-- Flash alerts -->
            <div th:replace="~{admin/fragments/alerts :: alerts}"></div>
            <!-- Child page content -->
            <div layout:fragment="content">
                <!-- overridden by child templates -->
            </div>
        </main>

    </div>
    <!-- ═══════════ END MAIN AREA ═══════════ -->

</div>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Sidebar toggle -->
<script>
(function () {
    'use strict';

    var STORAGE_KEY = 'adminSidebarCollapsed';
    var wrap        = document.getElementById('csAdminWrap');
    var toggle      = document.getElementById('csSidebarToggle');
    var backdrop    = document.getElementById('csSidebarBackdrop');

    function isDesktop() { return window.innerWidth >= 992; }

    // ── Restore desktop preference on load ─────────────────────
    if (isDesktop() && localStorage.getItem(STORAGE_KEY) === 'true') {
        wrap.classList.add('sidebar-collapsed');
    }

    // ── Toggle handler ──────────────────────────────────────────
    toggle.addEventListener('click', function () {
        if (isDesktop()) {
            wrap.classList.toggle('sidebar-collapsed');
            localStorage.setItem(STORAGE_KEY, wrap.classList.contains('sidebar-collapsed'));
        } else {
            wrap.classList.toggle('sidebar-mobile-open');
        }
    });

    // ── Close mobile sidebar via backdrop or Escape ─────────────
    backdrop.addEventListener('click', function () {
        wrap.classList.remove('sidebar-mobile-open');
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') wrap.classList.remove('sidebar-mobile-open');
    });

    // ── On resize: clean up stale classes ───────────────────────
    window.addEventListener('resize', function () {
        if (isDesktop()) {
            wrap.classList.remove('sidebar-mobile-open');
        }
    });
})();
</script>

<!-- Page-specific scripts injected by child templates -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
