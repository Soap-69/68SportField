<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="No image available">
  <!-- No background rect — background applied via CSS per card variant -->
  <!-- Camera body -->
  <rect x="148" y="110" width="104" height="76" rx="10" fill="none" stroke="#9e9e9e" stroke-width="3"/>
  <!-- Viewfinder bump -->
  <rect x="162" y="98" width="28" height="15" rx="4" fill="none" stroke="#9e9e9e" stroke-width="3"/>
  <!-- Lens ring -->
  <circle cx="200" cy="148" r="24" fill="none" stroke="#9e9e9e" stroke-width="3"/>
  <!-- Lens inner -->
  <circle cx="200" cy="148" r="10" fill="#9e9e9e" opacity="0.4"/>
  <!-- Flash dot -->
  <circle cx="228" cy="122" r="4" fill="#9e9e9e" opacity="0.6"/>
  <!-- Label -->
  <text x="200" y="225"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,sans-serif"
        font-size="13"
        font-weight="400"
        fill="#9e9e9e"
        opacity="0.7"
        text-anchor="middle"
        letter-spacing="0.3">No Image</text>
</svg>
